name: Extract Archives (ZIP and TAR)

on:
  push:
    paths:
      - '**.zip'
      - '**.tar'
      - '**.tar.gz'
      - '**.tgz'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
  contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Extract ZIP and TAR files
        run: |
          # Extract ZIP files
          find . -name "*.zip" -type f | while read zipfile; do
            dir="${zipfile%.zip}"
            if [ -n "$dir" ]; then
              mkdir -p "$dir"
              unzip -o "$zipfile" -d "$dir"
              rm "$zipfile"
            fi
          done
          
          # Extract TAR files (including .tar.gz)
          find . -type f \( -name "*.tar.gz" -o -name "*.tgz" \) | while read tarfile; do
            dir="${tarfile%.*.*}"
            if [ -n "$dir" ]; then
              mkdir -p "$dir"
              tar -xzf "$tarfile" -C "$dir"
              rm "$tarfile"
            fi
          done
          
          # Extract plain TAR files
          find . -name "*.tar" -type f ! -name "*.tar.gz" | while read tarfile; do
            dir="${tarfile%.tar}"
            if [ -n "$dir" ]; then
              mkdir -p "$dir"
              tar -xf "$tarfile" -C "$dir"
              rm "$tarfile"
            fi
          done
      
      - name: Commit extracted files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extract archive files" || echo "No changes to commit"
          git push
